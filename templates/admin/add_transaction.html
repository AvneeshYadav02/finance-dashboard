{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <a href="/view-user/{{ user_id }}"
            class="flex items-center gap-2 text-text-muted hover:text-primary-700 transition-colors group">
            <span
                class="material-symbols-outlined text-sm">arrow_left_alt</span>
            <span class="font-medium">Back to User Logs</span>
        </a>
    </div>

    <div class="bg-surface rounded-xl border border-border-main shadow-md overflow-hidden">
        <div class="flex items-center justify-start border-b border-border-main px-6 py-4 bg-backgroundl/30">
            <span class="material-symbols-outlined text-primary-700" style="font-size: 28px;">manage_accounts</span>
            <div class="ml-3">
                <h2 class="text-xl font-bold text-text-main">Add new Transaction for {{ active_page }}</h2>
                <p class="text-xs text-text-muted uppercase tracking-widest font-semibold">User ID: #{{ user_id }}</p>
            </div>
        </div>

        <form action="" method="POST" class="p-8 space-y-6">

            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <label for="amount" class="text-sm font-bold text-text-main uppercase tracking-tight">Amount *</label>
                </div>
                <input type="number" name="amount" id="amount" placeholder="eg. 2000" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-border-main bg-backgroundl text-text-main focus:border-primary-700 focus:bg-surface focus:outline-none transition-all font-medium">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="category" class="text-sm font-bold text-text-main uppercase tracking-tight">Category *</label>
                    <select name="category" id="category"
                        class="w-full px-4 py-3 rounded-xl border-2 border-border-main bg-backgroundl text-text-main focus:border-primary-700 focus:bg-surface focus:outline-none transition-all font-medium">
                        <option value="Salary">Salary</option>
                        <option value="Food">Food</option>
                        <option value="Rent">Rent</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Transport">Transport</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label for="type" class="text-sm font-bold text-text-main uppercase tracking-tight">Type *</label>
                    <select name="type" id="type"
                        class="w-full px-4 py-3 rounded-xl border-2 border-border-main bg-backgroundl text-text-main focus:border-primary-700 focus:bg-surface focus:outline-none transition-all font-medium">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center justify-end gap-4 pt-6">
                <button type="submit"
                    class="flex items-center gap-2 bg-gradient-to-bl from-primary-600 to-primary-700 text-white px-8 py-3 rounded-xl font-bold shadow-md shadow-primary-700/20 hover:from-primary-700 hover:to-primary-600 hover:shadow-xl active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-sm">save</span>
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
